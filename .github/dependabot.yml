version: 2

updates:
  # ── Python dependencies (uv ecosystem) — grouped minor/patch, PHACC isolated ─
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-minor-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "pytest-homeassistant-custom-component"
        update-types:
          - "minor"
          - "patch"
      ha-tracking:
        # PHACC tracks HA releases — its own dedicated PR, kept out of the quiet group
        patterns:
          - "pytest-homeassistant-custom-component"

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
    ignore:
      # D-10: leave floating @main/@master pins untouched — they track their
      # upstream branch intentionally.
      - dependency-name: "hacs/action"
      - dependency-name: "home-assistant/actions"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
