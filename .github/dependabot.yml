version: 2

updates:
  # ── Python dependencies (uv ecosystem) — grouped minor/patch ─────────────
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "pytest-homeassistant-custom-component"
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ── PHACC — dedicated monthly PR (D-09, tracks HA releases) ──────────────
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "ha-tracking"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-name: "pytest-homeassistant-custom-component"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
    ignore:
      # D-10: leave floating @main/@master pins untouched — they track their
      # upstream branch intentionally.
      - dependency-name: "hacs/action"
      - dependency-name: "home-assistant/actions"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
